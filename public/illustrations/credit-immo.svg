<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#0F3460"/>
    </linearGradient>
  </defs>
  <!-- House body -->
  <rect x="50" y="100" width="100" height="75" rx="4" fill="url(#houseGrad)"/>
  <!-- Roof -->
  <path d="M40,105 L100,50 L160,105" stroke="#0A2540" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
  <polygon points="40,105 100,50 160,105" fill="#0A2540"/>
  <!-- Chimney -->
  <rect x="130" y="58" width="14" height="30" rx="2" fill="#0A2540"/>
  <!-- Door -->
  <rect x="85" y="130" width="30" height="45" rx="3" fill="#C9A84C" opacity="0.9"/>
  <!-- Door handle -->
  <circle cx="108" cy="155" r="3" fill="#0A2540"/>
  <!-- Window left -->
  <rect x="58" y="112" width="20" height="20" rx="2" fill="#FFFFFF" opacity="0.2"/>
  <line x1="68" y1="112" x2="68" y2="132" stroke="#0A2540" stroke-width="1.5"/>
  <line x1="58" y1="122" x2="78" y2="122" stroke="#0A2540" stroke-width="1.5"/>
  <!-- Window right -->
  <rect x="122" y="112" width="20" height="20" rx="2" fill="#FFFFFF" opacity="0.2"/>
  <line x1="132" y1="112" x2="132" y2="132" stroke="#0A2540" stroke-width="1.5"/>
  <line x1="122" y1="122" x2="142" y2="122" stroke="#0A2540" stroke-width="1.5"/>
  <!-- Key icon bottom right -->
  <circle cx="165" cy="165" r="10" stroke="#C9A84C" stroke-width="2.5" fill="none"/>
  <line x1="173" y1="159" x2="188" y2="144" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="188" y1="144" x2="188" y2="150" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="183" y1="149" x2="183" y2="155" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
</svg>
