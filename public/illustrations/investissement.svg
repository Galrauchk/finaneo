<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="investGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.01"/>
    </linearGradient>
  </defs>
  <!-- Background grid -->
  <line x1="30" y1="40" x2="30" y2="170" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="72" y1="40" x2="72" y2="170" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="114" y1="40" x2="114" y2="170" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="156" y1="40" x2="156" y2="170" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="30" y1="70" x2="170" y2="70" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="30" y1="105" x2="170" y2="105" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="30" y1="140" x2="170" y2="140" stroke="#E2E8F0" stroke-width="0.5"/>
  <!-- Candlesticks -->
  <!-- Candle 1 - red/navy -->
  <line x1="48" y1="90" x2="48" y2="155" stroke="#0A2540" stroke-width="1.5"/>
  <rect x="42" y="110" width="12" height="30" rx="1" fill="#0A2540"/>
  <!-- Candle 2 - green -->
  <line x1="72" y1="80" x2="72" y2="150" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="66" y="90" width="12" height="40" rx="1" fill="#22c55e"/>
  <!-- Candle 3 - navy -->
  <line x1="96" y1="75" x2="96" y2="135" stroke="#0A2540" stroke-width="1.5"/>
  <rect x="90" y="85" width="12" height="35" rx="1" fill="#0A2540"/>
  <!-- Candle 4 - green -->
  <line x1="120" y1="50" x2="120" y2="120" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="114" y="60" width="12" height="40" rx="1" fill="#22c55e"/>
  <!-- Candle 5 - green tall -->
  <line x1="144" y1="35" x2="144" y2="100" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="138" y="42" width="12" height="40" rx="1" fill="#22c55e"/>
  <!-- Trend line -->
  <path d="M42,130 L72,100 L96,95 L120,65 L144,48" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow at end of trend -->
  <path d="M140,55 L150,45 L145,55" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Area under trend line -->
  <path d="M42,130 L72,100 L96,95 L120,65 L144,48 L144,170 L42,170 Z" fill="url(#investGrad)"/>
  <!-- Axis lines -->
  <line x1="30" y1="170" x2="170" y2="170" stroke="#0A2540" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="35" x2="30" y2="170" stroke="#0A2540" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Growth arrow top right -->
  <path d="M155,38 L170,25" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
  <path d="M162,24 L171,24 L171,33" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
