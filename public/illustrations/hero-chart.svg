  <!-- Data points -->
  <circle cx="50" cy="220" r="5" fill="#C9A84C"/>
  <circle cx="116" cy="192" r="5" fill="#C9A84C"/>
  <circle cx="182" cy="152" r="5" fill="#C9A84C"/>
  <circle cx="248" cy="100" r="5" fill="#C9A84C"/>
  <circle cx="314" cy="68" r="5" fill="#C9A84C"/>
  <circle cx="380" cy="42" r="5" fill="#C9A84C"/>
  <!-- Data point halos -->
  <circle cx="50" cy="220" r="9" fill="#C9A84C" opacity="0.15"/>
  <circle cx="116" cy="192" r="9" fill="#C9A84C" opacity="0.15"/>
  <circle cx="182" cy="152" r="9" fill="#C9A84C" opacity="0.15"/>
  <circle cx="248" cy="100" r="9" fill="#C9A84C" opacity="0.15"/>
