  <rect x="326" y="90" width="22" height="150" rx="3" fill="url(#barGrad)"/>
  <!-- Area fill beneath curve -->
  <path d="M50,220 C90,210 110,190 140,175 C170,160 200,140 215,125 C230,110 260,85 285,75 C310,65 350,50 380,42 L380,240 L50,240 Z" fill="url(#areaGrad)"/>
  <!-- Main curve line -->
